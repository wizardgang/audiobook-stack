global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'abogen_workers'
    static_configs:
      # Add the IP address and port (8000) of EVERY remote worker machine here.
      # Prometheus will reach out across your network to scrape their metrics!
      - targets: 
        - 'host.docker.internal:8000'   # Local worker (if running on this machine)
        # - '192.168.1.50:8000'         # Example Remote Worker A
        # - '192.168.1.51:8000'         # Example Remote Worker B
        # - '10.0.0.15:8000'            # Example Remote Worker C
        - '10.0.0.9:8000'
        - '10.0.0.8:8000'
