version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Remote Worker Node
#
# Deploy this on any additional server that has abogen installed.
# Point REDIS_URL at the main server's Redis.
# Mount or sync the shared output directory (NFS, SFTP, or rclone).
#
# Linux usage (pre-mount NFS on host, then set OUTPUT_DIR/CHUNKS_DIR):
#   REDIS_URL=redis://10.0.0.1:6379 \
#   WORKER_ID=remote-1 \
#   OUTPUT_DIR=/mnt/shared/outputs \
#   CHUNKS_DIR=/mnt/shared/chunks \
#   docker compose -f docker-compose.worker.yml up -d --build
#
# Windows usage (let Docker mount NFS — no Windows NFS client needed):
#   docker compose -f docker-compose.worker.yml -f docker-compose.worker.nfs.yml up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  abogen:
    build:
      context: .
      dockerfile: Dockerfile
    image: abogen-cpu:local
    container_name: abogen-worker
    ports:
      - "${ABOGEN_BIND_IP:-0.0.0.0}:${ABOGEN_PORT:-8808}:${ABOGEN_PORT:-8808}"
    volumes:
      - ${CHUNKS_DIR:-./chunks}:/data/uploads
      - ${OUTPUT_DIR:-./outputs}:/data/outputs
    environment:
      - ABOGEN_PORT=${ABOGEN_PORT:-8808}
      - TZ=${TZ:-Africa/Nairobi}
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: pipeline-worker
    profiles:
      - abogen-tts          # only starts when COMPOSE_PROFILES=abogen-tts
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_BIND_IP:-0.0.0.0}:${PROMETHEUS_PORT:-8000}:${PROMETHEUS_PORT:-8000}"
    environment:
      - REDIS_URL=${REDIS_URL:?Set REDIS_URL to the main server Redis}
      - ABOGEN_HOST=http://abogen:8808
      - WORKER_ID=${WORKER_ID:-remote-1}
      - PROMETHEUS_PORT=${PROMETHEUS_PORT:-8000}
      - OUTPUT_DIR=/outputs
      - SPOOL_DIR=/spool
      - SMB_RETRY_INTERVAL=${SMB_RETRY_INTERVAL:-30}
      - TTS_TIMEOUT_S=${TTS_TIMEOUT_S:-600}
      - TZ=${TZ:-Africa/Nairobi}
    volumes:
      - ${CHUNKS_DIR:-./chunks}:/chunks
      - ${OUTPUT_DIR:-./outputs}:/outputs
      - worker-spool:/spool
    depends_on:
      - abogen

  chattts-worker:
    build:
      context: ./chattts-worker
      dockerfile: Dockerfile
    container_name: pipeline-chattts-worker
    profiles:
      - chattts-tts          # enable with COMPOSE_PROFILES=chattts-tts
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_BIND_IP:-0.0.0.0}:${CHATTTS_PROMETHEUS_PORT:-8004}:${CHATTTS_PROMETHEUS_PORT:-8004}"
    environment:
      - REDIS_URL=${REDIS_URL:?Set REDIS_URL to the main server Redis}
      - WORKER_ID=${CHATTTS_WORKER_ID:-chattts-local-1}
      - PROMETHEUS_PORT=${CHATTTS_PROMETHEUS_PORT:-8004}
      - OUTPUT_DIR=/outputs
      - SPOOL_DIR=/spool
      - SMB_RETRY_INTERVAL=${SMB_RETRY_INTERVAL:-30}
      - USE_GPU=${USE_GPU:-false}
      - CHATTTS_DEVICE=${CHATTTS_DEVICE:-cpu}
      - CHATTTS_SPEED=${CHATTTS_SPEED:-5}
      - CHATTTS_TEMPERATURE=${CHATTTS_TEMPERATURE:-0.3}
      - CHATTTS_TOP_P=${CHATTTS_TOP_P:-0.7}
      - CHATTTS_TOP_K=${CHATTTS_TOP_K:-20}
      - CHATTTS_SPEAKER_SEED=${CHATTTS_SPEAKER_SEED:-42}
      - CHATTTS_MAX_CHARS=${CHATTTS_MAX_CHARS:-300}
      - CHATTTS_EMOTION=${CHATTTS_EMOTION:-narrator}
      - CHATTTS_REF_DIR=/ref
      - TZ=${TZ:-Africa/Nairobi}
    volumes:
      - ${OUTPUT_DIR:-./outputs}:/outputs
      - chattts-spool:/spool
      - chattts-models:/models
      # Bind-mount so speaker.pt is visible on the host and survives rebuilds.
      # Delete ref/speaker.pt to regenerate the voice with the current seed.
      - ./chattts-worker/ref:/ref

volumes:
  worker-spool:
    # Local named volume — persists MP3s across container restarts while SMB is offline
  chattts-spool:
  chattts-models:
    # Persists ChatTTS model weights across container rebuilds
