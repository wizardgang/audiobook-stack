# ─────────────────────────────────────────────
# Shared networks & volumes
# ─────────────────────────────────────────────
networks:
  pipeline:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

# ─────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────
services:

  # ── 1. REDIS (job queue + state store) ──────
  redis:
    image: redis:7-alpine
    container_name: pipeline-redis
    command: redis-server --appendonly yes
    restart: unless-stopped
    ports:
      - 10.0.0.1:6379:6379
    volumes:
      - redis-data:/data
    networks:
      - pipeline
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── 2. WATCHER (detects new PDFs) ───────────
  watcher:
    build:
      context: ./watcher
      dockerfile: Dockerfile
    container_name: pipeline-watcher
    restart: unless-stopped
    environment:
      - TZ=Africa/Nairobi
      - REDIS_URL=redis://redis:6379
      - WATCH_DIR=/watch
      - POLL_INTERVAL=5          # seconds between polls (fallback)
    volumes:
      - ./inbox:/watch            # drop PDFs here
      - ./chunks:/chunks          # split chunks land here
    networks:
      - pipeline
    depends_on:
      redis:
        condition: service_healthy

  # ── 3. ORCHESTRATOR (PDF splitter) ──────────
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: pipeline-orchestrator
    restart: unless-stopped
    environment:
      - TZ=Africa/Nairobi
      - REDIS_URL=redis://redis:6379
      - CHUNKS_DIR=/chunks
      - CHUNK_SIZE_CHARS=3000    # chars per TTS chunk (~3 min audio)
      - ABOGEN_HOST=${ABOGEN_HOST:-http://abogen:8808}
      - MIN_CHAPTER_CHARS=150   # skip chapters shorter than this (blank/title pages)
      # - SKIP_CHAPTERS=copyright,acknowledgment,dedication,about the author,bibliography,index
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-google/gemini-2.0-flash-001}
      - PROMETHEUS_PORT=8001
    volumes:
      - ./chunks:/chunks
      - ./inbox:/watch
    networks:
      - pipeline
    depends_on:
      redis:
        condition: service_healthy
  
  merger:
    build:
      context: ./merger
      dockerfile: Dockerfile
    container_name: pipeline-merger
    restart: unless-stopped
    environment:
      - TZ=Africa/Nairobi
      - REDIS_URL=redis://redis:6379
      - OUTPUT_DIR=/outputs
      - AUDIOBOOK_DIR=/audiobooks
      - CHUNKS_DIR=/chunks
      - PROMETHEUS_PORT=8002
    volumes:
      - ${OUTPUT_DIR}:/outputs    # per-chunk MP3s arrive here (set OUTPUT_DIR in .env)
      - ${CHUNKS_DIR}:/chunks     # text chunks for cleanup (set CHUNKS_DIR in .env)
      - ./audiobooks:/audiobooks  # final merged books land here
    networks:
      - pipeline
    depends_on:
      redis:
        condition: service_healthy

  
  # ── 4. ABOGEN API (text extraction + NLP chunking) ──
  abogen:
    build:
      context: .
      dockerfile: Dockerfile
    image: abogen-cpu:local
    container_name: abogen-worker
    restart: unless-stopped
    ports:
      - "${ABOGEN_BIND_IP:-10.0.0.1}:${ABOGEN_PORT:-8808}:${ABOGEN_PORT:-8808}"
    volumes:
      - ${CHUNKS_DIR:-./chunks}:/data/uploads
      - ${OUTPUT_DIR:-./outputs}:/data/outputs
    environment:
      - ABOGEN_PORT=${ABOGEN_PORT:-8808}
      - TZ=Africa/Nairobi
    networks:
      - pipeline

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    ports:
      - "10.0.0.1:13378:80"
    volumes:
      - ./audiobooks:/audiobooks
      - ./abs-metadata:/config
      - ./abs-config:/metadata
    environment:
      - TZ=Africa/Nairobi
    restart: unless-stopped
    networks:
      - pipeline

  prometheus:
    image: prom/prometheus:latest
    container_name: pipeline-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - pipeline

  grafana:
    image: grafana/grafana:latest
    container_name: pipeline-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/pipeline.json
    restart: unless-stopped
    networks:
      - pipeline

  

